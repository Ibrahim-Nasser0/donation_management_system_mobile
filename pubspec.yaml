version: 1.0.0+1

environment:
  sdk: ^3.11.0


dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.4
  get_it: ^9.2.1
  go_router: ^17.1.0
  dartz: ^0.10.1
  dio: ^5.9.2
  equatable: ^2.0.8
  google_fonts: ^8.0.2
  font_awesome_flutter: ^11.0.0

  cupertino_icons: ^1.0.8
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0

